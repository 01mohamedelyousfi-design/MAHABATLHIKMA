<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الألعاب التعليمية | محبة الحكمة</title>
    <meta name="description" content="ألعاب تعليمية تجعل الفلسفة تُعاش لا تُحفظ — تحطيم معلومات خاطئة، رحلة إلى فيلسوف، وحديث مع فيلسوف.">
    <link rel="icon" type="image/svg+xml" href="assets/logo/logo-mark.svg">
    <link rel="apple-touch-icon" href="assets/logo/logo-mark.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'sans-serif'], serif: ['Amiri', 'serif'] },
                    colors: {
                        primary: { DEFAULT: '#0f766e', light: '#14b8a6', dark: '#0d5f58' },
                        secondary: { DEFAULT: '#7c3aed', light: '#a78bfa', dark: '#5b21b6' },
                        accent: { DEFAULT: '#d97706', light: '#fbbf24', dark: '#b45309' },
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #fcfbf7; }
        .glass { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.3); }
        .card-hover { transition: all 0.35s cubic-bezier(0.4,0,0.2,1); }
        .card-hover:hover { transform: translateY(-6px); box-shadow: 0 25px 50px -15px rgba(0,0,0,0.12); }

        .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(15,23,42,0.75); backdrop-filter: blur(6px); display: flex; align-items: flex-start; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; overflow-y: auto; padding: 2rem 1rem; }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-box { transform: scale(0.96) translateY(10px); transition: transform 0.25s ease; }
        .modal-overlay.open .modal-box { transform: scale(1) translateY(0); }

        .game-thumb-fallback { display: none; }
        .game-thumb-img { display: block; }
    </style>
</head>
<body class="font-sans text-slate-900 pb-20">

    <!-- Back nav -->
    <nav class="sticky top-0 z-50 glass">
        <div class="max-w-5xl mx-auto px-4">
            <div class="flex justify-between h-16 items-center">
                <a href="index.html" class="flex items-center gap-2 text-slate-500 hover:text-slate-900 transition-colors">
                    <i data-lucide="arrow-right" class="w-5 h-5"></i> عودة
                </a>
                <h1 class="text-xl font-black text-slate-900 flex items-center gap-2">
                    <i data-lucide="gamepad-2" class="w-6 h-6 text-accent"></i> الألعاب التعليمية
                </h1>
                <div class="w-16"></div>
            </div>
        </div>
    </nav>

    <header class="max-w-3xl mx-auto px-4 pt-10 pb-4 text-center space-y-4">
        <div class="inline-flex items-center gap-2 bg-accent/10 px-4 py-2 rounded-full text-accent font-bold text-sm">
            <i data-lucide="sparkles" class="w-4 h-4"></i> Edu Games
        </div>
        <h2 class="text-3xl md:text-4xl font-black">الفلسفة تُلعب، لا تُحفظ فقط</h2>
        <p class="text-slate-500 font-medium leading-relaxed">
            ثلاث ألعاب تحوّل مفاهيم وسير الفلاسفة إلى تجربة تُعاش. اضغط على أي بطاقة لتتعرف على فكرتها، وكيف تُلعب، وكيف تفيد المعلم والمتعلم.
        </p>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-10">
        <div id="games-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="game-modal">
        <div class="modal-box bg-white rounded-3xl w-full max-w-2xl my-8 overflow-hidden shadow-2xl">
            <div id="modal-header" class="relative h-40 text-white flex items-end p-6">
                <button onclick="closeGameModal()" class="absolute top-4 left-4 w-9 h-9 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center transition-colors z-10">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
                <div id="modal-status" class="absolute top-4 right-4 text-[11px] font-black px-3 py-1 rounded-full"></div>
                <div>
                    <h3 id="modal-title" class="text-2xl font-black"></h3>
                    <p id="modal-subtitle" class="text-sm font-bold opacity-80"></p>
                </div>
            </div>
            <div class="p-6 space-y-6 max-h-[60vh] overflow-y-auto">
                <div>
                    <h4 class="font-black text-slate-900 flex items-center gap-2 mb-2"><i data-lucide="lightbulb" class="w-4 h-4 text-primary"></i> فكرة اللعبة</h4>
                    <p id="modal-idea" class="text-slate-600 leading-relaxed text-sm"></p>
                </div>
                <div>
                    <h4 class="font-black text-slate-900 flex items-center gap-2 mb-2"><i data-lucide="joystick" class="w-4 h-4 text-primary"></i> كيف تُلعب؟</h4>
                    <p id="modal-howto" class="text-slate-600 leading-relaxed text-sm"></p>
                </div>
                <div class="grid sm:grid-cols-2 gap-4">
                    <div class="bg-primary/5 rounded-2xl p-4">
                        <h4 class="font-black text-primary flex items-center gap-2 mb-2 text-sm"><i data-lucide="user-check" class="w-4 h-4"></i> فائدتها للمعلم</h4>
                        <p id="modal-teacher" class="text-slate-600 text-sm leading-relaxed"></p>
                    </div>
                    <div class="bg-secondary/5 rounded-2xl p-4">
                        <h4 class="font-black text-secondary flex items-center gap-2 mb-2 text-sm"><i data-lucide="user" class="w-4 h-4"></i> فائدتها للمتعلم</h4>
                        <p id="modal-student" class="text-slate-600 text-sm leading-relaxed"></p>
                    </div>
                </div>
            </div>
            <div class="p-6 pt-0">
                <a id="modal-play" href="#" target="_blank" rel="noopener noreferrer" class="hidden w-full bg-slate-900 text-white py-3.5 rounded-xl font-bold hover:bg-slate-800 transition-colors items-center justify-center gap-2">
                    <i data-lucide="play" class="w-4 h-4"></i> العب الآن
                </a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const GAMES = [
            {
                id: 'talk-to-philosopher',
                title: 'تحدّث مع فيلسوف',
                subtitle: 'Talk to a Philosopher',
                icon: 'message-circle-heart',
                gradient: 'from-secondary to-secondary-dark',
                thumb: 'assets/games/talk-to-philosopher.jpg',
                status: 'قيد التطوير',
                statusClass: 'bg-amber-400 text-amber-950',
                idea: 'محادثة تفاعلية حقيقية مع وكيل ذكاء اصطناعي يجسّد فيلسوفاً تاريخياً — لا إجابات عامة، بل شخصية مبنية على معرفة حقيقية من مصادر موثوقة، بحيث تشعر أنك تحاوره فعلاً لا مجرد "شات بوت" عام يجيب بأي شيء.',
                howto: 'ملاحظة مهمة: هذه اللعبة لا تزال قيد البناء التقني — ما هو متوفر حالياً هو الأساس الهندسي لمحرك المحادثة، وليس لعبة جاهزة للعب مباشرة بعد. الفكرة المخطَّطة: تختار الفيلسوف الذي تريد محاورته، وتطرح عليه أسئلتك بحرية داخل محادثة نصية، فيجيبك بأسلوبه وأفكاره الحقيقية بدل إجابة عامة.',
                teacher: 'من المتوقع أن تتيح للتلميذ "استجواب" الفيلسوف مباشرة بأسئلته الخاصة بدل الاكتفاء بما ورد في الكتاب المدرسي، ما يعمّق فهمه عبر حوار فعلي بدل التلقين.',
                student: 'من المتوقع أن تمنح إحساساً بالحوار المباشر مع صاحب الفكرة نفسه، وتشجع على طرح أسئلة نابعة من فضول حقيقي بدل انتظار السؤال من المعلم.',
            },
            {
                id: 'philo-crusher',
                title: 'فيلوكراشر',
                subtitle: 'PhiloCrusher',
                icon: 'target',
                gradient: 'from-accent to-accent-dark',
                thumb: 'assets/games/philosophy-crusher.jpg',
                status: 'متاحة الآن',
                statusClass: 'bg-emerald-500 text-white',
                url: 'https://philosophycrusher.pages.dev/',
                idea: 'لعبة بسيطة وسريعة الإيقاع: تتحكم في كرة فولاذية أسفل الشاشة بينما تتساقط عبارات عن ستة فلاسفة (أفلاطون، سقراط، أرسطو، ديكارت، كانط، ابن رشد) — بعضها صحيح وبعضها خاطئ. مهمتك: تحطيم الخاطئ فقط، وتفادي الصحيح.',
                howto: 'تحرّك الكرة يميناً ويساراً بالأسهم أو A/D، أو اتبع مؤشر الفأرة. اصطدم بالعبارة الخاطئة فتكسب نقاطاً، أما اصطدامك بعبارة صحيحة فيكلفك صحة ونقاطاً. في نهاية كل فيلسوف تواجه "وحش المغالطة" (Boss)، وبعد كل مستوى تحصل على شرح مفصّل لكل حقيقة ومغالطة واجهتها، مع 3 مستويات صعوبة و4 قدرات خاصة تساعدك أثناء اللعب.',
                teacher: 'أداة ممتعة لتصحيح التصورات الخاطئة الشائعة عن الفلاسفة بدل التصحيح النظري المباشر — تصلح كمقدمة مشوّقة لدرس جديد أو كمراجعة سريعة وممتعة قبل الامتحان.',
                student: 'تعلّم عبر التمييز الفوري بين الصحيح والخطأ (استرجاع فعّال لا حفظ سلبي)، مع تغذية راجعة فورية تشرح لماذا كانت كل معلومة خاطئة أو صحيحة.',
            },
            {
                id: 'rihla-ila-faylasuf',
                title: 'رحلة إلى فيلسوف',
                subtitle: 'A journey to a philosopher',
                icon: 'footprints',
                gradient: 'from-primary to-primary-dark',
                thumb: 'assets/games/rihla-ila-faylasuf.jpg',
                status: 'قريباً',
                statusClass: 'bg-white/90 text-slate-800',
                idea: 'لعبة منصات (platformer) على طراز سوبر ماريو، مصممة لطلاب الثانوي والباكالوريا: تتحرك داخل عالم جانبي ثنائي الأبعاد هدفه الوصول إلى الفيلسوف في نهاية المستوى ومصافحته. كل فيلسوف يعيش في عالمه البصري الخاص المستوحى من حضارته.',
                howto: 'تتنقل بالقفز فوق الأعداء — وهي استعارة بصرية عن تجاوز الجهل والتحيزات — وتجمع "الأوراق الفلسفية" المتناثرة في المستوى؛ كل ورقة تكشف بطاقة معلومة حقيقية عن الفيلسوف (اقتباس، حادثة تاريخية، أو فكرة فلسفية). تنتهي الرحلة بمصافحة الفيلسوف، حيث يظهر اقتباسه الأشهر في لحظة ختامية.',
                teacher: 'يحوّل تقديم سيرة فيلسوف ونصوصه إلى مغامرة بصرية بدل عرض تقديمي تقليدي — مدخل ممتاز لتحفيز فضول الطلاب قبل الدخول في تفاصيل الفيلسوف النظرية.',
                student: 'التعلّم مدمج في اللعب لا منفصل عنه — يكتسب المتعلم معلومات حقيقية أثناء اللعب دون أن يشعر أنه "يذاكر"، وتحويل تجاوز العقبات إلى استعارة عن تجاوز التحيّز يرسّخ الفكرة الفلسفية ضمنياً.',
            },
        ];

        function renderGrid() {
            const grid = document.getElementById('games-grid');
            grid.innerHTML = GAMES.map(g => `
                <div class="card-hover bg-white rounded-3xl overflow-hidden border border-slate-100 shadow-sm cursor-pointer" onclick="openGameModal('${g.id}')">
                    <div class="h-36 relative bg-gradient-to-br ${g.gradient} flex items-center justify-center overflow-hidden">
                        <img src="${g.thumb}" alt="${g.title}" class="game-thumb-img absolute inset-0 w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="game-thumb-fallback absolute inset-0 items-center justify-center">
                            <i data-lucide="${g.icon}" class="w-12 h-12 text-white/90"></i>
                        </div>
                        <span class="absolute top-3 right-3 text-[11px] font-black px-3 py-1 rounded-full ${g.statusClass}">${g.status}</span>
                    </div>
                    <div class="p-6 space-y-2">
                        <h3 class="text-lg font-black">${g.title}</h3>
                        <p class="text-slate-500 text-sm font-medium line-clamp-2">${g.idea}</p>
                        <div class="pt-2 text-primary font-bold text-sm flex items-center gap-1">
                            التفاصيل <i data-lucide="arrow-left" class="w-4 h-4"></i>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
            // fallback display fix (Tailwind can't conditionally show a class set via JS reliably before paint)
            document.querySelectorAll('.game-thumb-fallback').forEach(el => { el.style.display = 'none'; });
        }

        function openGameModal(id) {
            const g = GAMES.find(x => x.id === id);
            if (!g) return;
            document.getElementById('modal-header').className = `relative h-40 text-white flex items-end p-6 bg-gradient-to-br ${g.gradient}`;
            document.getElementById('modal-status').textContent = g.status;
            document.getElementById('modal-status').className = `absolute top-4 right-4 text-[11px] font-black px-3 py-1 rounded-full ${g.statusClass}`;
            document.getElementById('modal-title').textContent = g.title;
            document.getElementById('modal-subtitle').textContent = g.subtitle;
            document.getElementById('modal-idea').textContent = g.idea;
            document.getElementById('modal-howto').textContent = g.howto;
            document.getElementById('modal-teacher').textContent = g.teacher;
            document.getElementById('modal-student').textContent = g.student;

            const playBtn = document.getElementById('modal-play');
            if (g.url) {
                playBtn.href = g.url;
                playBtn.classList.remove('hidden');
                playBtn.classList.add('flex');
            } else {
                playBtn.classList.add('hidden');
                playBtn.classList.remove('flex');
            }

            document.getElementById('game-modal').classList.add('open');
            lucide.createIcons();
        }

        function closeGameModal() {
            document.getElementById('game-modal').classList.remove('open');
        }
        document.getElementById('game-modal').addEventListener('click', function (e) {
            if (e.target === this) closeGameModal();
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeGameModal();
        });

        renderGrid();
    </script>
</body>
</html>
